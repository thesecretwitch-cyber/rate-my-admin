<!DOCTYPE html>
<html>
<head>
  <title>Rate My Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding: 40px; background:#f4f7f5;">

<h1>Rate My Admin</h1>
<p>Anonymous teacher reviews of school leadership and workplace culture.</p>

<hr>

<h2>Browse Approved Reviews</h2>

<label>Choose District</label>
<select id="districtFilter">
  <option value="">Select a district</option>
</select>

<br><br>

<label>Choose School</label>
<select id="schoolFilter">
  <option value="">Select a school</option>
</select>

<div id="reviewsList" style="margin-top:25px;"></div>

<hr>

<h2>Submit a Review</h2>

<form id="reviewForm">
  <input id="school_name" placeholder="School Name" required><br><br>
  <input id="district_name" placeholder="District Name" required><br><br>

  <select id="admin_role">
    <option>Principal</option>
    <option>Assistant Principal</option>
    <option>District Administrator</option>
  </select><br><br>

  <input id="reviewer_role" placeholder="Your Role, ex: Current Teacher"><br><br>
  <input id="relationship_to_school" placeholder="Relationship to School"><br><br>

  <label>Support</label>
  <select id="support_rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><br><br>

  <label>Communication</label>
  <select id="communication_rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><br><br>

  <label>Fairness</label>
  <select id="fairness_rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><br><br>

  <label>Climate</label>
  <select id="climate_rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><br><br>

  <label>Workload Respect</label>
  <select id="workload_rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><br><br>

  <textarea id="written_review" placeholder="Write your review..." required></textarea><br><br>

  <button type="submit">Submit Review</button>
</form>

<p id="message"></p>

<script>
const SUPABASE_URL = "https://ralzsoolkzrtmetpkudr.supabase.co";
const SUPABASE_KEY = "sb_publishable_6jBBizQoWFQMax-n8NKt3w_z7YgscGm";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let approvedReviews = [];

async function loadReviews() {
  const { data, error } = await client
    .from("reviews")
    .select("*")
    .eq("approved", true)
    .eq("moderation_status", "approved");

  if (error) {
    document.getElementById("reviewsList").innerHTML = "Could not load reviews.";
    return;
  }

  approvedReviews = data || [];

  const districts = [...new Set(approvedReviews.map(r => r.district_name))]
    .sort((a,b) => a.localeCompare(b));

  const districtFilter = document.getElementById("districtFilter");
  districtFilter.innerHTML = '<option value="">Select a district</option>';

  districts.forEach(district => {
    const option = document.createElement("option");
    option.value = district;
    option.textContent = district;
    districtFilter.appendChild(option);
  });
}

function loadSchools() {
  const selectedDistrict = document.getElementById("districtFilter").value;
  const schoolFilter = document.getElementById("schoolFilter");

  schoolFilter.innerHTML = '<option value="">Select a school</option>';
  document.getElementById("reviewsList").innerHTML = "";

  const schools = [...new Set(
    approvedReviews
      .filter(r => r.district_name === selectedDistrict)
      .map(r => r.school_name)
  )].sort((a,b) => a.localeCompare(b));

  schools.forEach(school => {
    const option = document.createElement("option");
    option.value = school;
    option.textContent = school;
    schoolFilter.appendChild(option);
  });
}

function showReviews() {
  const district = document.getElementById("districtFilter").value;
  const school = document.getElementById("schoolFilter").value;

  const reviews = approvedReviews.filter(r =>
    r.district_name === district && r.school_name === school
  );

  const reviewsList = document.getElementById("reviewsList");

  if (reviews.length === 0) {
    reviewsList.innerHTML = "<p>No approved reviews yet.</p>";
    return;
  }

  reviewsList.innerHTML = reviews.map(r => {
    const average = (
      (r.support_rating + r.communication_rating + r.fairness_rating + r.climate_rating + r.workload_rating) / 5
    ).toFixed(1);

    return `
      <div style="background:white; padding:22px; border-radius:18px; margin-bottom:18px; box-shadow:0 6px 18px rgba(0,0,0,.08);">
        <h3>${r.school_name}</h3>
        <p><strong>${r.district_name}</strong></p>
        <p>Overall Rating: <strong>${average}/5</strong></p>
        <p>Support: ${r.support_rating}/5 | Communication: ${r.communication_rating}/5 | Fairness: ${r.fairness_rating}/5</p>
        <p>Climate: ${r.climate_rating}/5 | Workload Respect: ${r.workload_rating}/5</p>
        <p><em>“${r.written_review}”</em></p>
        <p style="color:#64748b;">Role: ${r.reviewer_role || "Not listed"}</p>
      </div>
    `;
  }).join("");
}

document.getElementById("districtFilter").addEventListener("change", loadSchools);
document.getElementById("schoolFilter").addEventListener("change", showReviews);

document.getElementById("reviewForm").addEventListener("submit", async function(event) {
  event.preventDefault();

  const review = {
    school_name: document.getElementById("school_name").value,
    district_name: document.getElementById("district_name").value,
    admin_role: document.getElementById("admin_role").value,
    reviewer_role: document.getElementById("reviewer_role").value,
    relationship_to_school: document.getElementById("relationship_to_school").value,
    support_rating: Number(document.getElementById("support_rating").value),
    communication_rating: Number(document.getElementById("communication_rating").value),
    fairness_rating: Number(document.getElementById("fairness_rating").value),
    climate_rating: Number(document.getElementById("climate_rating").value),
    workload_rating: Number(document.getElementById("workload_rating").value),
    written_review: document.getElementById("written_review").value,
    approved: false,
    moderation_status: "pending"
  };

  const { error } = await client.from("reviews").insert([review]);

  if (error) {
    document.getElementById("message").innerText = "Something went wrong: " + error.message;
  } else {
    document.getElementById("message").innerText = "Review submitted! It is pending moderation.";
    document.getElementById("reviewForm").reset();
  }
});

loadReviews();
</script>

</body>
</html>
